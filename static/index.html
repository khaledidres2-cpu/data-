<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Finder — باحث العملاء</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14231E; --muted:#5E7069; --line:#DDE5E1; --bg:#F6F8F7; --card:#FFFFFF;
  --primary:#0E5A4E; --primary-dark:#0A423A; --wa:#1EBE5D; --wa-dark:#149C4A;
  --sand:#C9A24B; --danger:#C0392B; --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html[dir="rtl"] body{font-family:'Tajawal',sans-serif}
html[dir="ltr"] body{font-family:'IBM Plex Sans','Tajawal',sans-serif}
body{background:var(--bg);color:var(--ink);min-height:100vh;font-size:16px}
.hidden{display:none!important}
button{cursor:pointer;font-family:inherit;border:none}
input{font-family:inherit}

/* ---------- الهيدر ---------- */
header{background:var(--primary-dark);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.logo{font-weight:900;font-size:20px;letter-spacing:.3px}
.logo span{color:#8FD8B7}
.hdr-actions{display:flex;gap:8px;align-items:center}
.pill{background:rgba(255,255,255,.12);color:#fff;border-radius:99px;padding:7px 14px;font-size:14px;font-weight:500}
.pill:hover{background:rgba(255,255,255,.22)}

/* ---------- صفحة العرض ---------- */
.land-hero{max-width:820px;margin:0 auto;padding:64px 20px 42px;text-align:center}
.land-badge{display:inline-block;background:#E9F1EE;color:var(--primary-dark);border-radius:99px;padding:7px 16px;font-size:13.5px;font-weight:700;margin-bottom:18px}
.land-hero h1{font-size:40px;font-weight:900;line-height:1.25;margin-bottom:14px}
.land-hero h1 em{font-style:normal;color:var(--primary)}
.land-hero .lead-txt{color:var(--muted);font-size:17.5px;line-height:1.8;max-width:620px;margin:0 auto 26px}
.land-cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-cta{background:var(--primary);color:#fff;border-radius:12px;padding:15px 34px;font-size:16.5px;font-weight:700}
.btn-cta:hover{background:var(--primary-dark)}
.btn-cta2{background:#fff;color:var(--primary);border:1.5px solid var(--line);border-radius:12px;padding:15px 30px;font-size:16.5px;font-weight:700}
.btn-cta2:hover{border-color:var(--primary)}
.land-note{color:var(--muted);font-size:13.5px;margin-top:14px}
.land-sec{max-width:1000px;margin:0 auto;padding:44px 20px}
.land-sec.alt{background:#fff;max-width:none}
.land-sec.alt > div{max-width:1000px;margin:0 auto}
.land-h2{font-size:26px;font-weight:900;text-align:center;margin-bottom:8px}
.land-sub{color:var(--muted);text-align:center;margin-bottom:30px;font-size:15.5px}
.land-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.f-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 20px}
.f-ico{font-size:26px;margin-bottom:10px}
.f-card h3{font-size:16.5px;font-weight:900;margin-bottom:6px}
.f-card p{color:var(--muted);font-size:14px;line-height:1.75}
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;counter-reset:s}
.step{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 20px;position:relative}
.step-n{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:15px}
.step h3{font-size:16px;font-weight:900;margin-bottom:5px}
.step p{color:var(--muted);font-size:14px;line-height:1.7}
.land-foot{text-align:center;padding:20px;color:var(--muted);font-size:13px}
.acct-box{border-top:1px solid var(--line);margin-top:20px;padding-top:18px}
.acct-box h4{font-size:14.5px;font-weight:900;margin-bottom:10px}
.acct-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap}
.acct-row .field{flex:1;min-width:150px;margin-bottom:0}
.btn-sm{background:var(--primary);color:#fff;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;white-space:nowrap}
.btn-sm:hover{background:var(--primary-dark)}
@media (max-width:560px){ .land-hero h1{font-size:29px} .land-hero{padding:40px 16px 30px} }

/* ---------- شاشة الدخول ---------- */
.auth-wrap{max-width:420px;margin:56px auto;padding:0 16px}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px}
.auth-card h1{font-size:24px;font-weight:900;margin-bottom:6px}
.auth-card p{color:var(--muted);font-size:14px;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#FBFCFB}
.field input:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:var(--primary)}
.field textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14.5px;background:#FBFCFB;font-family:inherit;resize:vertical;min-height:76px}
.field textarea:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:var(--primary)}
.field .hint{font-size:12px;color:var(--muted);margin-top:4px}
.btn-main{width:100%;background:var(--primary);color:#fff;padding:13px;border-radius:10px;font-size:16px;font-weight:700}
.btn-main:hover{background:var(--primary-dark)}
.btn-main:disabled{opacity:.6;cursor:wait}
.switch-auth{text-align:center;margin-top:14px;font-size:14px;color:var(--muted)}
.switch-auth a{color:var(--primary);font-weight:700;cursor:pointer;text-decoration:none}

/* ---------- منطقة البحث (البطل) ---------- */
.search-hero{max-width:760px;margin:40px auto 8px;padding:0 16px;text-align:center}
.search-hero h2{font-size:26px;font-weight:900;margin-bottom:4px}
.search-hero .sub{color:var(--muted);font-size:15px;margin-bottom:22px}
.search-box{display:flex;gap:8px;background:var(--card);border:1.5px solid var(--line);border-radius:99px;padding:6px;box-shadow:0 4px 18px rgba(14,90,78,.07)}
.search-box:focus-within{border-color:var(--primary)}
.search-box input{flex:1;border:none;background:transparent;padding:10px 16px;font-size:16px;min-width:0}
.search-box input:focus{outline:none}
.search-box button{background:var(--primary);color:#fff;border-radius:99px;padding:11px 26px;font-size:15px;font-weight:700;white-space:nowrap}
.search-box button:hover{background:var(--primary-dark)}
.search-box button:disabled{opacity:.6;cursor:wait}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.filter-row{display:flex;justify-content:center;margin-top:12px}
.filter-row label{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--muted);cursor:pointer;font-weight:500}
.filter-row input{width:17px;height:17px;accent-color:var(--primary);cursor:pointer}
.chip{background:#E9F1EE;color:var(--primary-dark);border-radius:99px;padding:6px 14px;font-size:13px;font-weight:500}
.chip:hover{background:#DCEAE5}

/* ---------- التبويبات والنتائج ---------- */
.container{max-width:1000px;margin:0 auto;padding:10px 16px 60px}
.tabs{display:flex;gap:6px;margin:22px 0 14px;border-bottom:1px solid var(--line)}
.tab{background:none;padding:10px 18px;font-size:15px;font-weight:700;color:var(--muted);border-bottom:2.5px solid transparent}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.status{text-align:center;color:var(--muted);padding:26px;font-size:15px}
.count-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:14px;color:var(--muted)}

.lead{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.lead-info{flex:1;min-width:220px}
.lead-name{font-size:17px;font-weight:700;margin-bottom:3px}
.lead-addr{color:var(--muted);font-size:13.5px;margin-bottom:6px}
.lead-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:13.5px}
.rating{color:var(--sand);font-weight:700}
.lead-phone{direction:ltr;unicode-bidi:embed;font-weight:600}
.lead-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-wa{background:var(--wa);color:#fff;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-wa:hover{background:var(--wa-dark)}
.btn-sec{background:#EEF3F1;color:var(--ink);border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center}
.btn-sec:hover{background:#E2EAE6}
.no-wa{color:var(--muted);font-size:13px;padding:10px 4px}

.hist{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hist:hover{border-color:var(--primary)}
.hist .q{font-weight:700}
.hist .m{color:var(--muted);font-size:13px;margin-top:2px}
.hist .n{background:#E9F1EE;color:var(--primary-dark);border-radius:99px;padding:4px 12px;font-size:13px;font-weight:700}

.toast{position:fixed;bottom:24px;inset-inline-start:50%;transform:translateX(50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:99px;font-size:14px;z-index:99;opacity:0;transition:.3s;pointer-events:none}
html[dir="ltr"] .toast{transform:translateX(-50%)}
.toast.show{opacity:1}
.toast.err{background:var(--danger)}

/* ---------- إعدادات الشركة ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,35,30,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;max-width:420px;width:100%}
.modal h3{font-size:18px;font-weight:900;margin-bottom:16px}
.logo-preview{max-height:60px;max-width:140px;display:block;margin-top:8px;border:1px solid var(--line);border-radius:8px;padding:4px}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.btn-ghost{flex:1;background:#EEF3F1;color:var(--ink);padding:12px;border-radius:10px;font-size:15px;font-weight:600}
.modal-actions .btn-main{flex:1;width:auto}
.btn-ai{background:#7C3AED;color:#fff;border-radius:10px;padding:9px 18px;font-size:14px;font-weight:700}
.btn-ai:hover{background:#6D28D9}
.btn-ai:disabled{opacity:.6;cursor:wait}
.bar-actions{display:flex;gap:8px}
.ai-badge{background:#F1EAFD;color:#6D28D9;border-radius:99px;padding:4px 12px;font-size:13px;font-weight:900}
.ai-reason{color:#6D28D9;font-size:13px;margin-top:6px;line-height:1.5}
.status-sel{border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;font-weight:700;background:#fff;cursor:pointer;font-family:inherit;color:var(--muted)}
.st-contacted{color:#1D4ED8;border-color:#BFDBFE;background:#EFF6FF}
.st-replied{color:#0F766E;border-color:#99F6E4;background:#F0FDFA}
.st-interested{color:#B45309;border-color:#FDE68A;background:#FFFBEB}
.st-meeting{color:#6D28D9;border-color:#DDD6FE;background:#F5F3FF}
.st-deal{color:#15803D;border-color:#BBF7D0;background:#F0FDF4}
.st-lost{color:#B91C1C;border-color:#FECACA;background:#FEF2F2}
.deal-val{color:#15803D;font-weight:700}
.pipe-stats{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.pipe-stat{border-radius:99px;padding:7px 14px;font-size:13px;font-weight:700;border:1.5px solid var(--line);background:#fff;color:var(--muted)}
.pipe-stat.active{outline:2px solid var(--ink)}
.pipe-total{margin-inline-start:auto;font-weight:900;color:#15803D;font-size:14px}
.fu-head{font-weight:900;font-size:16px;margin:4px 0 10px;color:#B45309}
.lead.follow{border-color:#FDE68A;background:#FFFBEB}
.wait-badge{background:#FEF3C7;color:#B45309;border-radius:99px;padding:4px 12px;font-size:12.5px;font-weight:700}
.fu-msg{background:#fff;border:1.5px dashed #FCD34D;border-radius:10px;padding:10px 12px;font-size:13.5px;line-height:1.8;margin-top:8px}
.btn-fu{background:#FEF3C7;color:#B45309}
.btn-fu:hover{background:#FDE68A}
#followBox{margin-bottom:16px}
.usage-bar{margin-top:14px;font-size:13.5px;color:var(--muted)}
.link-btn{background:none;border:none;color:var(--primary);font-weight:700;cursor:pointer;font-size:13px;text-decoration:underline;font-family:inherit;padding:0 4px}
.plans-modal{max-width:720px}
#plansGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:6px}
.plan-card{border:1.5px solid var(--line);border-radius:12px;padding:18px 14px;text-align:center}
.plan-card.current{border-color:var(--primary);background:#F0F7F4}
.plan-name{font-weight:900;font-size:16px;margin-bottom:6px}
.plan-price{font-size:22px;font-weight:900;color:var(--primary)}
.plan-feat{color:var(--muted);font-size:13px;margin:10px 0 14px;line-height:1.8}
.plan-cur{color:var(--primary);font-weight:700;font-size:13.5px;padding:10px 0}
.admin-modal{max-width:820px}
.usr{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.usr-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.usr-mail{font-weight:700;font-size:14.5px;direction:ltr;unicode-bidi:embed}
.usr-meta{color:var(--muted);font-size:12.5px;margin-top:3px}
.usr-ctl{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
.usr-ctl select,.usr-ctl input{border:1.5px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13px;font-family:inherit;background:#fff}
.usr-ctl input{width:64px}
.btn-act{background:var(--primary);color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700}
.btn-act:hover{background:var(--primary-dark)}
.badge-plan{border-radius:99px;padding:4px 12px;font-size:12.5px;font-weight:900}
.bp-free{background:#EEF3F1;color:var(--muted)}
.bp-basic{background:#DBEAFE;color:#1D4ED8}
.bp-pro{background:#EDE9FE;color:#6D28D9}
.bp-exp{background:#FEE2E2;color:#B91C1C}
#usersList{max-height:52vh;overflow-y:auto;margin-top:8px}
.btn-pdf{background:var(--primary);color:#fff;border-radius:10px;padding:9px 18px;font-size:14px;font-weight:700}
.btn-pdf:hover{background:var(--primary-dark)}
.btn-pdf:disabled{opacity:.6;cursor:wait}
.btn-mini{background:#EEF3F1;color:var(--ink);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center}
.btn-mini:hover{background:#E2EAE6}
@media (max-width:560px){
  .search-hero h2{font-size:21px}
  .lead{flex-direction:column}
  .lead-actions{width:100%}
  .btn-wa{flex:1;justify-content:center}
}
</style>
</head>
<body>

<header>
  <div class="logo" id="logo">Lead<span>Finder</span></div>
  <div class="hdr-actions">
    <button class="pill" id="langBtn" onclick="toggleLang()">English</button>
    <button class="pill hidden" id="adminBtn" onclick="openAdmin()"></button>
    <button class="pill hidden" id="settingsBtn" onclick="openSettings()"></button>
    <button class="pill hidden" id="logoutBtn" onclick="logout()"></button>
  </div>
</header>

<!-- صفحة العرض -->
<div id="landingScreen">
  <div class="land-hero">
    <div class="land-badge" id="lndBadge"></div>
    <h1 id="lndTitle"></h1>
    <div class="lead-txt" id="lndLead"></div>
    <div class="land-cta">
      <button class="btn-cta" id="lndCta1" onclick="showAuth('register')"></button>
      <button class="btn-cta2" id="lndCta2" onclick="showAuth('login')"></button>
    </div>
    <div class="land-note" id="lndNote"></div>
  </div>

  <div class="land-sec alt"><div>
    <div class="land-h2" id="lndFeatH"></div>
    <div class="land-sub" id="lndFeatSub"></div>
    <div class="land-grid" id="lndFeatures"></div>
  </div></div>

  <div class="land-sec">
    <div class="land-h2" id="lndStepsH"></div>
    <div class="land-sub" id="lndStepsSub"></div>
    <div class="steps" id="lndSteps"></div>
  </div>

  <div class="land-sec alt"><div>
    <div class="land-h2" id="lndPriceH"></div>
    <div class="land-sub" id="lndPriceSub"></div>
    <div id="lndPlans" class="land-grid"></div>
    <div style="text-align:center;margin-top:26px">
      <button class="btn-cta" id="lndCta3" onclick="showAuth('register')"></button>
    </div>
  </div></div>

  <div class="land-foot" id="lndFoot"></div>
</div>

<!-- شاشة الدخول -->
<div class="auth-wrap hidden" id="authScreen">
  <div class="auth-card">
    <h1 id="authTitle"></h1>
    <p id="authSub"></p>
    <div class="field" id="companyField">
      <label id="lblCompany"></label>
      <input id="inCompany" type="text">
    </div>
    <div class="field">
      <label id="lblEmail"></label>
      <input id="inEmail" type="email" dir="ltr">
    </div>
    <div class="field">
      <label id="lblPassword"></label>
      <input id="inPassword" type="password" dir="ltr">
    </div>
    <button class="btn-main" id="authBtn" onclick="submitAuth()"></button>
    <div class="switch-auth"><span id="switchTxt"></span> <a id="switchLink" onclick="toggleAuthMode()"></a></div>
    <div class="switch-auth"><a id="backLink" onclick="showLanding()"></a></div>
  </div>
</div>

<!-- الشاشة الرئيسية -->
<div id="appScreen" class="hidden">
  <div class="search-hero">
    <h2 id="heroTitle"></h2>
    <div class="sub" id="heroSub"></div>
    <div class="search-box">
      <input id="inQuery" type="text" onkeydown="if(event.key==='Enter')runSearch()">
      <button id="searchBtn" onclick="runSearch()"></button>
    </div>
    <div class="filter-row">
      <label><input type="checkbox" id="strictCity" checked> <span id="strictLbl"></span></label>
    </div>
    <div class="chips" id="chips"></div>
    <div class="usage-bar" id="usageBar"></div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" id="tabResults" onclick="showTab('results')"></button>
      <button class="tab" id="tabPipeline" onclick="showTab('pipeline')"></button>
      <button class="tab" id="tabHistory" onclick="showTab('history')"></button>
    </div>
    <div id="panelResults">
      <div class="count-bar hidden" id="countBar"><span id="countTxt"></span><div class="bar-actions"><button class="btn-ai" id="aiBtn" onclick="runAnalyze()"></button><button class="btn-pdf" id="pdfBtn" onclick="downloadPDF()"></button></div></div>
      <div id="resultsList"><div class="status" id="emptyResults"></div></div>
    </div>
    <div id="panelPipeline" class="hidden">
      <div id="followBox"></div>
      <div class="pipe-stats" id="pipeStats"></div>
      <div id="pipelineList"></div>
    </div>
    <div id="panelHistory" class="hidden">
      <div id="historyList"><div class="status" id="emptyHistory"></div></div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="settingsOverlay">
  <div class="modal">
    <h3 id="setTitle"></h3>
    <div class="field">
      <label id="setLblName"></label>
      <input id="setCompany" type="text">
    </div>
    <div class="field">
      <label id="setLblDesc"></label>
      <textarea id="setDesc"></textarea>
      <div class="hint" id="setDescHint"></div>
    </div>
    <div class="field">
      <label id="setLblLogo"></label>
      <input id="setLogo" type="file" accept="image/*" onchange="logoChanged(this)">
      <img class="logo-preview hidden" id="logoPreview">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="setCancel" onclick="closeSettings()"></button>
      <button class="btn-main" id="setSave" onclick="saveSettings()"></button>
    </div>

    <div class="acct-box">
      <h4 id="acctTitle"></h4>
      <div class="usr-meta" style="margin-bottom:12px"><span id="acctNowLbl"></span>
        <b dir="ltr" id="acctNow" style="color:var(--ink)"></b></div>
      <div class="acct-row">
        <div class="field"><label id="acctLblEmail"></label><input id="acctEmail" type="email" dir="ltr"></div>
        <div class="field"><label id="acctLblPw1"></label><input id="acctPw1" type="password" dir="ltr"></div>
        <button class="btn-sm" id="acctEmailBtn" onclick="changeEmail()"></button>
      </div>
      <div class="acct-row">
        <div class="field"><label id="acctLblCur"></label><input id="acctCur" type="password" dir="ltr"></div>

const t = () => T[lang];

  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

  $("logoutBtn").textContent = t().logout;
  $("settingsBtn").textContent = "⚙ " + t().settings;

  $("setLblLogo").textContent = t().setLogo;
  $("setCancel").textContent = t().cancel;
  $("setSave").textContent = t().save;
  $("pdfBtn").textContent = t().pdf;
  $("strictLbl").textContent = t().strictCity;
  $("setLblDesc").textContent = t().setDesc;
  $("setDescHint").textContent = t().setDescHint;
  $("aiBtn").textContent = t().ai;
  $("plansTitle").textContent = t().plansTitle;
  $("plansClose").textContent = t().close;
  $("adminBtn").textContent = t().admBtn;
  $("admTitle").textContent = t().admTitle;
  $("admSearch").placeholder = t().admSearchPh;
  $("admCancel").textContent = t().cancel;
  renderUsage();
  $("lblCompany").textContent = t().company;
  $("lblEmail").textContent = t().email;
  $("lblPassword").textContent = t().password;
  $("heroTitle").textContent = t().heroTitle;
  $("heroSub").textContent = t().heroSub;
  $("inQuery").placeholder = t().searchPlaceholder;
  $("searchBtn").textContent = t().searchBtn;
  $("tabResults").textContent = t().tabResults;
  $("tabHistory").textContent = t().tabHistory;
  $("tabPipeline").textContent = t().tabPipeline;
  $("emptyResults") && ($("emptyResults").textContent = t().emptyResults);
  $("emptyHistory") && ($("emptyHistory").textContent = t().emptyHistory);
  $("chips").innerHTML = t().chips.map(c =>
    `<button class="chip" onclick="useChip(this)">${c}</button>`).join("");
  applyAuthMode();
  applyLanding();
  $("acctTitle").textContent = t().acctTitle;
  $("acctNowLbl").textContent = t().acctNow;
  $("acctLblEmail").textContent = t().acctEmail;
  $("acctLblPw1").textContent = t().acctPwConfirm;
  $("acctLblCur").textContent = t().acctCur;
  $("acctLblNew").textContent = t().acctNew;

}

function toggleLang(){ lang = lang === "ar" ? "en" : "ar"; localStorage.setItem("lf_lang", lang); applyLang(); }
function useChip(el){ $("inQuery").value = el.textContent; runSearch(); }

/* ---------------- المصادقة ---------------- */
function applyAuthMode(){
  const login = authMode === "login";
  $("authTitle").textContent = login ? t().loginTitle : t().registerTitle;
  $("authSub").textContent = login ? t().loginSub : t().registerSub;
  $("authBtn").textContent = login ? t().loginBtn : t().registerBtn;
  $("switchTxt").textContent = login ? t().noAccount : t().haveAccount;
  $("switchLink").textContent = login ? t().createOne : t().loginLink;
  $("companyField").classList.toggle("hidden", login);
}
function toggleAuthMode(){ authMode = authMode === "login" ? "register" : "login"; applyAuthMode(); }

function showAuth(mode){
  authMode = mode; applyAuthMode();
  $("landingScreen").classList.add("hidden");
  $("authScreen").classList.remove("hidden");
  window.scrollTo(0,0);
}
function showLanding(){
  $("authScreen").classList.add("hidden");
  $("landingScreen").classList.remove("hidden");
  window.scrollTo(0,0);
}

async function submitAuth(){
  const btn = $("authBtn"); btn.disabled = true;
  try{
    const path = authMode === "login" ? "/api/login" : "/api/register";
    const body = { email:$("inEmail").value, password:$("inPassword").value };
    if(authMode === "register") body.company_name = $("inCompany").value;
    const r = await fetch(path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || t().errNetwork);
    token = d.token;
    localStorage.setItem("lf_token", token);
    showApp();
  }catch(e){ toast(e.message, true); }
  btn.disabled = false;
}
function logout(){ token=""; localStorage.removeItem("lf_token"); location.reload(); }

/* ---------------- الشاشات ---------------- */
function showApp(){
  $("landingScreen").classList.add("hidden");
  $("authScreen").classList.add("hidden");
  $("appScreen").classList.remove("hidden");
  $("logoutBtn").classList.remove("hidden");
  $("settingsBtn").classList.remove("hidden");
  loadCompany();
  loadUsage();
  loadHistory();
}
function showTab(name){
  $("tabResults").classList.toggle("active", name==="results");
  $("tabHistory").classList.toggle("active", name==="history");
  $("tabPipeline").classList.toggle("active", name==="pipeline");
  $("panelResults").classList.toggle("hidden", name!=="results");
  $("panelHistory").classList.toggle("hidden", name!=="history");
  $("panelPipeline").classList.toggle("hidden", name!=="pipeline");
  if(name==="history") loadHistory();
  if(name==="pipeline") loadPipeline();
}

/* ---------------- الطلبات ---------------- */
async function api(path, opts={}){
  const r = await fetch(path, {...opts, headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer "+token,
    ...(opts.headers||{})
  }});
  if(r.status === 401){ logout(); return; }
  const d = await r.json();
  if(!r.ok){
    const err = new Error(d.detail || t().errNetwork);
    err.status = r.status;
    throw err;
  }
  return d;
}

/* ---------------- البحث ---------------- */
async function runSearch(){
  const q = $("inQuery").value.trim();
  if(!q) return;
  const btn = $("searchBtn");
  btn.disabled = true; btn.textContent = t().searching;
  showTab("results");
  $("resultsList").innerHTML = `<div class="status">${t().searching}</div>`;
  $("countBar").classList.add("hidden");
  try{
    const d = await api("/api/search", {method:"POST", body:JSON.stringify({query:q, language:lang, strict_city:$("strictCity").checked})});
    lastSearchId = d.search_id; lastQuery = q;
    renderLeads(d.leads, q);
    toast(t().done(d.count));
  }catch(e){
    $("resultsList").innerHTML = `<div class="status">${e.message}</div>`;
    toast(e.message, true);
    if(e.status === 402) openPlans();
  }
  btn.disabled = false; btn.textContent = t().searchBtn;
  loadUsage();
}

function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function statusSelect(l){
  const st = l.status || "new";
  const opts = Object.entries(t().statuses).map(([k,v]) =>
    `<option value="${k}" ${k===st?"selected":""}>${v}</option>`).join("");
  return `<select class="status-sel st-${st}" onchange="setStatus(${l.id}, this)">${opts}</select>`;
}

function leadCard(l){
  return `
    <div class="lead">
      <div class="lead-info">
        <div class="lead-name">${esc(l.name)} ${l.ai_score ? `<span class="ai-badge">${t().aiScore(l.ai_score)}</span>` : ""}</div>
        <div class="lead-addr">${esc(l.address)}</div>
        <div class="lead-meta">
          ${l.rating ? `<span class="rating">★ ${l.rating}</span><span>(${l.reviews_count||0} ${t().reviews})</span>` : ""}
          ${l.phone ? `<span class="lead-phone">${esc(l.phone)}</span>` : ""}
          ${l.deal_value ? `<span class="deal-val">💰 ${Number(l.deal_value).toLocaleString()} AED</span>` : ""}
        </div>
        <div class="lead-meta" style="margin-top:8px">
          ${l.id ? statusSelect(l) : ""}
          ${l.phone ? `<a class="btn-mini" href="tel:${esc(l.phone).replace(/\s/g,'')}">📞 ${t().call}</a>
          <button class="btn-mini" onclick="copyPhone('${esc(l.phone)}')">📋 ${t().copy}</button>` : ""}
          ${l.ai_message ? `<button class="btn-mini" data-msg="${esc(l.ai_message)}" onclick="copyMsg(this)">💬 ${t().msgCopy}</button>` : ""}
        </div>
        ${l.ai_reason ? `<div class="ai-reason">${esc(l.ai_reason)}</div>` : ""}
      </div>
      <div class="lead-actions">
        ${l.whatsapp
          ? `<a class="btn-wa" href="${esc(l.whatsapp)}${l.ai_message ? '?text='+encodeURIComponent(l.ai_message) : ''}" target="_blank" rel="noopener" onclick="waClicked(this, ${l.id||0})">💬 ${t().whatsapp}</a>`
          : `<span class="no-wa">${t().noPhone}</span>`}
        ${l.website ? `<a class="btn-sec" href="${esc(l.website)}" target="_blank" rel="noopener">${t().website}</a>` : ""}
        ${l.maps_url ? `<a class="btn-sec" href="${esc(l.maps_url)}" target="_blank" rel="noopener">${t().maps}</a>` : ""}
      </div>
    </div>`;
}

function renderLeads(leads, query){
  if(!leads.length){
    $("resultsList").innerHTML = `<div class="status">${t().emptyResults}</div>`;
    return;
  }
  $("countBar").classList.remove("hidden");
  $("countTxt").textContent = t().resultsFor(leads.length, query);
  $("resultsList").innerHTML = leads.map(leadCard).join("");
}

/* ---------------- خط السير ---------------- */
let pipeData = null, pipeFilter = "";

async function loadPipeline(){
  $("pipelineList").innerHTML = `<div class="status">${t().loading}</div>`;
  try{
    pipeData = await api("/api/pipeline");
    renderPipeline();
  }catch(e){ $("pipelineList").innerHTML = `<div class="status">${e.message}</div>`; }
}

function renderPipeline(){
  const fus = pipeData.followups || [];
  $("followBox").innerHTML = fus.length
    ? `<div class="fu-head">${t().needFollowup(fus.length)}</div>` + fus.map(followCard).join("")
    : "";
  const st = pipeData.stats || {};
  const order = ["contacted","replied","interested","meeting","deal","lost"];
  $("pipeStats").innerHTML = order.map(k => {
    const c = (st[k] && st[k].count) || 0;
    return `<button class="pipe-stat st-${k} ${pipeFilter===k?"active":""}" onclick="setPipeFilter('${k}')">${t().statuses[k]}: ${c}</button>`;
  }).join("") + `<span class="pipe-total">💰 ${t().dealTotal}: ${Number(pipeData.deal_total||0).toLocaleString()} AED</span>`;
  const leads = (pipeData.leads||[]).filter(l => !pipeFilter || l.status===pipeFilter);
  $("pipelineList").innerHTML = leads.length ? leads.map(leadCard).join("") : `<div class="status">${t().emptyPipeline}</div>`;
}

function setPipeFilter(k){ pipeFilter = pipeFilter===k ? "" : k; renderPipeline(); }

function followCard(l){
  return `
    <div class="lead follow">
      <div class="lead-info">
        <div class="lead-name">${esc(l.name)} <span class="wait-badge">${t().waitDays(l.days_waiting||3)}</span></div>
        <div class="lead-addr">${esc(l.address)}</div>
        <div class="lead-meta" style="margin-top:8px" id="fu-${l.id}">
          <button class="btn-mini btn-fu" onclick="genFollowup(${l.id}, this)">✨ ${t().genFollowup}</button>
          ${l.phone ? `<span class="lead-phone">${esc(l.phone)}</span>` : ""}
        </div>
      </div>
    </div>`;
}

async function genFollowup(id, btn){
  btn.disabled = true; btn.textContent = t().fuWriting;
  try{
    const d = await api(`/api/leads/${id}/followup`, {method:"POST", body:JSON.stringify({language:lang})});
    const l = (pipeData.followups||[]).find(x=>x.id===id) || {};
    const wa = l.whatsapp ? `${esc(l.whatsapp)}?text=${encodeURIComponent(d.message)}` : "";
    $(`fu-${id}`).innerHTML = `
      <div style="width:100%">
        <div class="fu-msg">${esc(d.message)}</div>
        <div class="lead-meta" style="margin-top:8px">
          ${wa ? `<a class="btn-wa" href="${wa}" target="_blank" rel="noopener" onclick="fuSent(${id}, this)">💬 ${t().whatsapp}</a>` : ""}
          <button class="btn-mini" data-msg="${esc(d.message)}" onclick="copyMsg(this)">📋 ${t().msgCopy}</button>
        </div>
      </div>`;
  }catch(e){
    toast(e.message, true);
    btn.disabled = false; btn.textContent = "✨ " + t().genFollowup;
  }
}

function fuSent(id, el){
  api(`/api/leads/${id}/status`, {method:"POST", body:JSON.stringify({status:"contacted"})}).catch(()=>{});
  const card = el.closest(".lead");
  if(card) setTimeout(()=> card.remove(), 400);
  toast(t().fuBumped);
}

async function setStatus(id, sel){
  const status = sel.value;
  let deal_value = null;
  if(status === "deal"){
    const v = prompt(t().dealPrompt, "");
    if(v !== null && v.trim() !== "" && !isNaN(parseFloat(v))) deal_value = parseFloat(v);
  }
  try{
    await api(`/api/leads/${id}/status`, {method:"POST", body:JSON.stringify({status, deal_value})});
    sel.className = "status-sel st-" + status;
    toast(t().statusSaved);
    if(!$("panelPipeline").classList.contains("hidden")) loadPipeline();
  }catch(e){ toast(e.message, true); }
}

function waClicked(el, id){
  if(!id) return;
  const sel = el.closest(".lead").querySelector(".status-sel");
  if(sel && sel.value === "new"){
    api(`/api/leads/${id}/status`, {method:"POST", body:JSON.stringify({status:"contacted"})}).catch(()=>{});
    sel.value = "contacted";
    sel.className = "status-sel st-contacted";
  }
}

/* ---------------- السجل ---------------- */
async function loadHistory(){
  try{
    const items = await api("/api/searches");
    if(!items || !items.length){
      $("historyList").innerHTML = `<div class="status">${t().emptyHistory}</div>`;
      return;
    }
    $("historyList").innerHTML = items.map(s => `
      <div class="hist" onclick="openSearch(${s.id}, '${esc(s.query).replace(/'/g,"\\'")}')">
        <div>
          <div class="q">${esc(s.query)}</div>
          <div class="m">${new Date(s.created_at).toLocaleString(lang==="ar"?"ar-AE":"en-GB")}</div>
        </div>
        <span class="n">${s.results_count}</span>
      </div>`).join("");
  }catch(e){ /* تجاهل */ }
}

async function openSearch(id, query){
  showTab("results");
  $("resultsList").innerHTML = `<div class="status">${t().loading}</div>`;
  try{
    const leads = await api(`/api/searches/${id}/leads`);
    lastSearchId = id; lastQuery = query;
    renderLeads(leads, query);
  }catch(e){ toast(e.message, true); }
}

/* ---------------- الشركة وPDF والنسخ ---------------- */
let lastSearchId = null;
let lastQuery = "";

async function runAnalyze(){
  if(!lastSearchId) return;
  const btn = $("aiBtn");
  btn.disabled = true; btn.textContent = t().aiWorking;
  try{
    let remaining = 1, total = 0, guard = 0;
    while(remaining > 0 && guard < 15){
      const d = await api(`/api/searches/${lastSearchId}/analyze`,
        {method:"POST", body:JSON.stringify({language:lang})});
      remaining = d.remaining; total = d.total;
      btn.textContent = t().aiProgress(total - remaining, total);
      guard++;
    }
    const leads = await api(`/api/searches/${lastSearchId}/leads`);
    renderLeads(leads, lastQuery);
    toast(t().aiDone);
  }catch(e){
    toast(e.message, true);
    if(e.status === 402) openPlans();
  }
  btn.disabled = false; btn.textContent = t().ai;
  loadUsage();
}
function copyMsg(btn){
  navigator.clipboard.writeText(btn.dataset.msg).then(()=>toast(t().msgCopied)).catch(()=>{});
}
let companyData = {company_name:"", logo_base64:""};

async function loadCompany(){
  try{ companyData = await api("/api/company"); }catch(e){}
}
function openSettings(){
  $("acctNow").textContent = (usageData && usageData.email) || "";
  $("setCompany").value = companyData.company_name || "";
  $("setDesc").value = companyData.business_description || "";
  const p = $("logoPreview");
  if(companyData.logo_base64){ p.src = companyData.logo_base64; p.classList.remove("hidden"); }
  else p.classList.add("hidden");
  $("settingsOverlay").classList.remove("hidden");
}
function closeSettings(){ $("settingsOverlay").classList.add("hidden"); }
function logoChanged(input){
  const f = input.files[0];
  if(!f) return;
  if(f.size > 1_500_000){ toast(t().logoTooBig, true); input.value=""; return; }
  const r = new FileReader();
  r.onload = () => {
    companyData.logo_base64 = r.result;
    $("logoPreview").src = r.result;
    $("logoPreview").classList.remove("hidden");
  };
  r.readAsDataURL(f);
}
async function saveSettings(){
  try{
    companyData.company_name = $("setCompany").value;
    companyData.business_description = $("setDesc").value;
    await api("/api/company", {method:"POST", body:JSON.stringify(companyData)});
    toast(t().saved);
    closeSettings();
  }catch(e){ toast(e.message, true); }
}
async function downloadPDF(){
  if(!lastSearchId) return;
  const btn = $("pdfBtn");
  btn.disabled = true; btn.textContent = t().pdfWorking;
  try{
    if(!companyData.company_name && !companyData.logo_base64) toast(t().pdfHint);
    const r = await fetch(`/api/searches/${lastSearchId}/pdf?lang=${lang}`,
      {headers:{Authorization:"Bearer "+token}});
    if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.detail || t().errNetwork); }
    const blob = await r.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `leads-${lastSearchId}.pdf`;
    a.click();
    URL.revokeObjectURL(a.href);
  }catch(e){ toast(e.message, true); }
  btn.disabled = false; btn.textContent = t().pdf;
}
function copyPhone(p){
  navigator.clipboard.writeText(p).then(()=>toast(t().copied)).catch(()=>{});
}

/* ---------------- إعدادات الحساب ---------------- */

async function changePassword(){
  const btn = $("acctPwBtn"); btn.disabled = true;
  try{
    await api("/api/account/password", {method:"POST", body:JSON.stringify({
      current_password: $("acctCur").value, new_password: $("acctNew").value })});

    toast(t().pwChanged + " — " + t().reloginMsg);

/* ---------------- الاستخدام والخطط ---------------- */
let usageData = null;

async function loadUsage(){
  try{
    usageData = await api("/api/usage");
    renderUsage();
    if(usageData.is_admin) $("adminBtn").classList.remove("hidden");
  }catch(e){}
}

function renderUsage(){
  if(!usageData){ $("usageBar").innerHTML = ""; return; }
  $("acctNow").textContent = usageData.email || "";
  const u = usageData;
  $("usageBar").innerHTML =
    `<span dir="ltr">${esc(u.email||"")}</span> · ` +
    `${t().planWord}: <b>${t().planNames[u.plan]}</b> · ` +
    `${t().usageSearches} ${u.searches_used}/${u.searches_limit} · ` +
    `${t().usageAnalyses} ${u.analyses_used}/${u.analyses_limit}` +
    `<button class="link-btn" onclick="openPlans()">${t().plansBtn}</button>`;
}

function openPlans(){
  if(!usageData) return;
  const P = usageData.plans, cur = usageData.plan;
  $("plansGrid").innerHTML = ["free","basic","pro"].map(k=>{
    const p = P[k], isCur = k===cur;
    const waMsg = encodeURIComponent(t().waActivateMsg(t().planNames[k], usageData.email||""));
    let btn = "";
    if(isCur) btn = `<div class="plan-cur">${t().currentPlan}</div>`;
    else if(k !== "free")
      btn = usageData.support_whatsapp
        ? `<a class="btn-wa" style="justify-content:center;width:100%" href="https://wa.me/${usageData.support_whatsapp}?text=${waMsg}" target="_blank" rel="noopener">💬 ${t().activateWa}</a>`
        : `<div class="plan-cur">${t().contactUs}</div>`;
    return `<div class="plan-card ${isCur?"current":""}">
      <div class="plan-name">${t().planNames[k]}</div>
      <div class="plan-price">${p.price ? p.price + " " + t().perMonth : t().freePrice}</div>
      <div class="plan-feat">${t().planFeat(p.searches, p.analyses)}</div>
      ${btn}</div>`;
  }).join("");
  $("plansOverlay").classList.remove("hidden");
}
function closePlans(){ $("plansOverlay").classList.add("hidden"); }

let usersData = [];

async function openAdmin(){
  $("adminOverlay").classList.remove("hidden");
  $("usersList").innerHTML = `<div class="status">${t().loading}</div>`;
  try{
    usersData = await api("/api/admin/users");
    renderUsers();
  }catch(e){ $("usersList").innerHTML = `<div class="status">${e.message}</div>`; }
}

function planBadge(u){
  if(u.plan === "free") return `<span class="badge-plan bp-free">${t().planNames.free}</span>`;
  const cls = u.active ? (u.plan === "pro" ? "bp-pro" : "bp-basic") : "bp-exp";
  const label = u.active
    ? `${t().planNames[u.plan]} · ${new Date(u.plan_expires_at).toLocaleDateString(lang==="ar"?"ar-AE":"en-GB")}`
    : `${t().planNames[u.plan]} · ${t().admExpired}`;
  return `<span class="badge-plan ${cls}">${label}</span>`;
}

function renderUsers(){
  const q = ($("admSearch").value || "").trim().toLowerCase();
  const list = usersData.filter(u => !q || (u.email||"").toLowerCase().includes(q));
  if(!list.length){ $("usersList").innerHTML = `<div class="status">${t().noUsers}</div>`; return; }
  $("usersList").innerHTML = list.map(u => `
    <div class="usr">
      <div class="usr-top">
        <div>
          <div class="usr-mail">${esc(u.email)}</div>
          <div class="usr-meta">${esc(u.company_name||"—")} · ${u.searches_used} ${t().usageSearches} · ${u.leads_count} ${t().admLeads} · ${t().admJoined} ${new Date(u.created_at).toLocaleDateString(lang==="ar"?"ar-AE":"en-GB")}</div>
        </div>
        ${planBadge(u)}
      </div>
      <div class="usr-ctl">
        <select id="up-${u.id}">
          <option value="basic">${t().planNames.basic} — 99</option>
          <option value="pro">${t().planNames.pro} — 199</option>
          <option value="free">${t().planNames.free}</option>
        </select>
        <input id="um-${u.id}" type="number" value="1" min="1" max="24" title="${t().admMonthsShort}">
        <span class="usr-meta">${t().admMonthsShort}</span>
        <button class="btn-act" onclick="activateUser('${esc(u.email)}', ${u.id}, this)">${t().activate}</button>
      </div>
    </div>`).join("");
}

async function activateUser(email, id, btn){
  btn.disabled = true;
  try{
    const d = await api("/api/admin/activate", {method:"POST", body:JSON.stringify({
      email: email,
      plan: $(`up-${id}`).value,
      months: parseInt($(`um-${id}`).value) || 1
    })});
    toast(t().activated + " " + (d.plan_expires_at ? new Date(d.plan_expires_at).toLocaleDateString(lang==="ar"?"ar-AE":"en-GB") : "∞"));
    usersData = await api("/api/admin/users");
    renderUsers();
    loadUsage();
  }catch(e){ toast(e.message, true); }
  btn.disabled = false;
}

/* ---------------- إشعارات ---------------- */
let toastTimer;
function toast(msg, err=false){
  const el = $("toast");
  el.textContent = msg;
  el.className = "toast show" + (err ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.className = "toast", 3000);
}

/* ---------------- البداية ---------------- */
applyLang();
if(token) showApp();
</script>
